<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifesto — Rodeo Lens</title>

    <!-- Scorpion favicon -->
    <link rel="icon" type="image/png" href="../Scorpion.png">
    <link rel="apple-touch-icon" href="../Scorpion.png">

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.18);
            --muted: rgba(255,255,255,.65);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 20%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 85%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar (logo centered, plus Manifesto link on left like home) */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        /* Manifesto text link stays at top; clicking goes HOME */
        .manifesto-link{
            position:absolute;
            top:18px;
            left:22px;

            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);

            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:14px;
            user-select:none;

            opacity:.9;
            transition: opacity .15s ease;
        }

        .manifesto-link:hover{
            opacity:1;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        /* Center logo, clickable to home */
        .brand-link{
            pointer-events:auto;
            display:inline-flex;
            align-items:center;
            text-decoration:none;
            cursor:pointer;
        }

        .brand-link img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
            transition: transform .15s ease, opacity .15s ease;
        }

        .brand-link:hover img{
            transform: translateY(-1px);
            opacity:1;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Bigger, plain bordered manifesto box */
        .manifesto-box{
            width: min(1200px, 94vw);
            min-height: min(720px, 72vh);
            border: 1px solid var(--edge);
            background: transparent;
            border-radius: 0;
            padding: 26px 26px;

            white-space: pre-wrap;
        }

        /* Match main-page Manifesto link font style */
        .manifesto-text{
            margin:0;
            color: var(--fg);
            letter-spacing: .18em;
            text-transform: uppercase;
            font-size: 14px;
            line-height: 1.9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .placeholder{ color: var(--muted); }

        @media (max-width: 520px){
            .manifesto-box{
                padding: 18px;
                min-height: min(720px, 78vh);
            }
            .manifesto-link{ font-size:13px; }
            .manifesto-text{
                font-size: 13px;
                letter-spacing: .16em;
            }
        }

        /* ===========================
           FIX #1: Mobile header stack
           =========================== */
        @media (max-width: 560px){
            .topbar{
                padding:14px 16px;
                align-items:center;
            }

            /* put MANIFESTO on its own row */
            .manifesto-link{
                position:static;   /* stop absolute overlap */
                display:block;
                text-align:left;
                margin-bottom:10px;
            }

            /* keep logo centered on its own row */
            .brand-link{
                justify-content:center;
            }

            .brand-link img{
                height:38px;       /* slightly smaller logo on mobile */
            }
        }
    </style>
</head>

<body>
<header class="topbar">
    <!-- Stays at top; clicking goes HOME (absolute path keeps URL clean) -->
    <a class="manifesto-link" href="/">Manifesto</a>

    <!-- Logo centered; goes HOME -->
    <a class="brand-link" href="/" aria-label="Go to Home">
        <img src="../RodeoLens.png" alt="Rodeo Lens" />
    </a>
</header>

<main class="wrap">
    <div class="manifesto-box">
        <p class="manifesto-text placeholder">insert manifesto.</p>

        <!-- Example:
        <p class="manifesto-text">
        WE MOVE QUIET.
        WE SHOOT CLEAN.
        WE DON'T ASK TWICE.
        </p>
        -->
    </div>
</main>
</body>
</html>
