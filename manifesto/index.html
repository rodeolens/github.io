<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifesto — Rodeo Lens</title>

    <!-- Scorpion favicon -->
    <link rel="icon" type="image/png" href="../Scorpion.png">
    <link rel="apple-touch-icon" href="../Scorpion.png">

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.18);
            --muted: rgba(255,255,255,.65);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 20%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 85%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar (logo centered like home) */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        .brand-link{
            pointer-events:auto;
            display:inline-flex;
            align-items:center;
            text-decoration:none;
            cursor:pointer;
        }

        .brand-link img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
            transition: transform .15s ease, opacity .15s ease;
        }

        .brand-link:hover img{
            transform: translateY(-1px);
            opacity:1;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Plain bordered manifesto box */
        .manifesto-box{
            width: min(980px, 90vw);
            min-height: min(520px, 62vh);
            border: 1px solid var(--edge);
            background: transparent;
            border-radius: 0;
            padding: 26px 26px;

            /* text */
            color: var(--fg);
            font-size: 16px;
            line-height: 1.8;
            letter-spacing: 0.01em;

            /* preserve your line breaks when you paste text */
            white-space: pre-wrap;
        }

        .placeholder{
            color: var(--muted);
        }

        @media (max-width: 520px){
            .manifesto-box{
                padding: 18px;
                min-height: min(520px, 68vh);
            }
        }
    </style>
</head>

<body>
<header class="topbar">
    <a class="brand-link" href="../index.html" aria-label="Go to Home">
        <img src="../RodeoLens.png" alt="Rodeo Lens" />
    </a>
</header>

<main class="wrap">
    <div class="manifesto-box">
        <span class="placeholder">PASTE YOUR MANIFESTO TEXT HERE.</span>

        <!-- Example formatting:
        RODEO LENS IS...
        LINE 2...
        LINE 3...
        -->
    </div>
</main>
</body>
</html>
