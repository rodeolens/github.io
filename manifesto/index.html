<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifesto — Rodeo Lens</title>

    <!-- Scorpion favicon -->
    <link rel="icon" type="image/png" href="../Scorpion.png">
    <link rel="apple-touch-icon" href="../Scorpion.png">

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.18);
            --muted: rgba(255,255,255,.65);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 20%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 85%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        /* Desktop Manifesto text link (top-left) */
        .manifesto-link{
            position:absolute;
            top:18px;
            left:22px;

            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);

            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:14px;
            user-select:none;

            opacity:.9;
            transition: opacity .15s ease;
        }

        .manifesto-link:hover{
            opacity:1;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        /* Center logo, clickable to home */
        .brand-link{
            pointer-events:auto;
            display:inline-flex;
            align-items:center;
            text-decoration:none;
            cursor:pointer;
        }

        .brand-link img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
            transition: transform .15s ease, opacity .15s ease;
        }

        .brand-link:hover img{
            transform: translateY(-1px);
            opacity:1;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Bigger, plain bordered manifesto box */
        .manifesto-box{
            width: min(1200px, 94vw);
            min-height: min(720px, 72vh);
            border: 1px solid var(--edge);
            background: transparent;
            border-radius: 0;
            padding: 26px 26px;
            white-space: pre-wrap;
        }

        /* Fade-in like the scorpion (opacity + slight rise) */
        .manifesto-fade{
            opacity:0;
            transform: translateY(10px);
            animation: manifestoFadeIn 900ms ease-out 80ms forwards;
        }

        @keyframes manifestoFadeIn{
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

        /* Match main-page Manifesto link font style */
        .manifesto-text{
            margin:0;
            color: var(--fg);
            letter-spacing: .18em;
            text-transform: uppercase;
            font-size: 14px;
            line-height: 1.9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .placeholder{ color: var(--muted); }

        @media (max-width: 520px){
            .manifesto-box{
                padding: 18px;
                min-height: min(720px, 78vh);
            }
            .manifesto-link{ font-size:13px; }
            .manifesto-text{
                font-size: 13px;
                letter-spacing: .16em;
            }
        }

        @media (prefers-reduced-motion: reduce){
            .manifesto-fade{
                animation:none;
                opacity:1;
                transform:none;
            }
        }

        /* ===========================
           MOBILE MENU (top-left)
           =========================== */

        /* hamburger button hidden on desktop */
        .menu-btn{
            display:none;
            pointer-events:auto;
            position:absolute;
            top:14px;
            left:14px;

            width:42px;
            height:42px;
            border:1px solid var(--edge);
            background: rgba(0,0,0,.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius:10px;

            align-items:center;
            justify-content:center;
            cursor:pointer;
        }

        .menu-btn:focus{
            outline:2px solid rgba(255,255,255,.25);
            outline-offset:2px;
        }

        .menu-icon{
            width:18px;
            height:12px;
            position:relative;
        }
        .menu-icon span{
            position:absolute;
            left:0;
            right:0;
            height:2px;
            background: rgba(255,255,255,.9);
            border-radius:2px;
        }
        .menu-icon span:nth-child(1){ top:0; }
        .menu-icon span:nth-child(2){ top:5px; opacity:.85; }
        .menu-icon span:nth-child(3){ top:10px; }

        /* dropdown panel */
        .menu-panel{
            display:none;
            pointer-events:auto;
            position:absolute;
            top:62px;
            left:14px;

            min-width: 180px;
            border:1px solid var(--edge);
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 18px 40px rgba(0,0,0,.55);
            padding:10px;
        }

        .menu-panel a{
            display:block;
            padding:10px 12px;
            text-decoration:none;
            color:var(--fg);
            letter-spacing:.14em;
            text-transform:uppercase;
            font-size:13px;
            opacity:.92;
            border:1px solid transparent;
        }

        .menu-panel a:hover{
            opacity:1;
            border-color: rgba(255,255,255,.12);
        }

        /* show menu + hide desktop manifesto link on mobile */
        @media (max-width: 560px){
            .topbar{
                padding:14px 16px;
                align-items:center;
            }

            .manifesto-link{
                display:none; /* replaced by dropdown menu */
            }

            .menu-btn{
                display:flex;
            }

            .brand-link img{
                height:38px;
            }

            .menu-panel.is-open{
                display:block;
            }
        }
    </style>
</head>

<body>
<header class="topbar">
    <!-- Mobile menu button (only visible on mobile) -->
    <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="menuPanel">
        <div class="menu-icon" aria-hidden="true">
            <span></span><span></span><span></span>
        </div>
    </button>

    <!-- Mobile dropdown (currently just Home, since you're already on Manifesto page) -->
    <nav class="menu-panel" id="menuPanel" aria-label="Site menu">
        <a href="/">Home</a>
    </nav>

    <!-- Desktop link (top-left) -->
    <a class="manifesto-link" href="/">Manifesto</a>

    <!-- Logo centered; goes HOME -->
    <a class="brand-link" href="/" aria-label="Go to Home">
        <img src="../RodeoLens.png" alt="Rodeo Lens" />
    </a>
</header>

<main class="wrap">
    <!-- added manifesto-fade here -->
    <div class="manifesto-box manifesto-fade">
        <p class="manifesto-text placeholder">insert manifesto.</p>

        <!-- Example:
        <p class="manifesto-text">
        WE MOVE QUIET.
        WE SHOOT CLEAN.
        WE DON'T ASK TWICE.
        </p>
        -->
    </div>
</main>

<script>
    // Mobile menu toggle
    const menuBtn = document.getElementById("menuBtn");
    const menuPanel = document.getElementById("menuPanel");

    function closeMenu(){
        menuPanel.classList.remove("is-open");
        menuBtn.setAttribute("aria-expanded", "false");
    }

    menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = menuPanel.classList.toggle("is-open");
        menuBtn.setAttribute("aria-expanded", String(isOpen));
    });

    // Close on outside click
    document.addEventListener("click", () => closeMenu());

    // Close on Escape
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
    });

    // Prevent clicks inside the menu from closing before navigating
    menuPanel.addEventListener("click", (e) => e.stopPropagation());
</script>
</body>
</html>
