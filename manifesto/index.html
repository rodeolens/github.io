<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifesto — Rodeo Lens</title>

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.18);
            --muted: rgba(255,255,255,.65);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 20%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 85%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar (match home page: logo centered) */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        /* Make logo clickable back home */
        .brand-link{
            pointer-events:auto;
            display:inline-flex;
            align-items:center;
            text-decoration:none;
            cursor:pointer;
        }

        .brand-link img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
            transition: transform .15s ease, opacity .15s ease;
        }

        .brand-link:hover img{
            transform: translateY(-1px);
            opacity:1;
        }

        /* Layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px; /* room for topbar */
        }

        /* Plain bordered text box */
        .textbox{
            width: min(980px, 90vw);      /* "decent amount of the screen" */
            min-height: min(520px, 62vh); /* tall, but responsive */
            border: 1px solid var(--edge);
            background: transparent;      /* no bubble fill */
            border-radius: 0;             /* no rounded bubble look */
            padding: 22px 22px;
            outline: none;

            color: var(--fg);
            font-size: 16px;
            line-height: 1.7;
            letter-spacing: 0.01em;
        }

        .textbox::placeholder{
            color: var(--muted);
        }

        .textbox:focus{
            border-color: rgba(255,255,255,.35);
        }

        @media (max-width: 520px){
            .textbox{
                padding: 18px;
                min-height: min(520px, 68vh);
            }
        }
    </style>
</head>

<body>
<!-- Centered logo (same as first page) -->
<header class="topbar">
    <a class="brand-link" href="../index.html" aria-label="Go to Home">
        <img src="../RodeoLens.png" alt="Rodeo Lens" />
    </a>
</header>

<main class="wrap">
    <!-- Editable blank text box -->
    <textarea class="textbox" placeholder="Write your manifesto here..."></textarea>
</main>
</body>
</html>
