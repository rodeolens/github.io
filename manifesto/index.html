<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifesto — Rodeo Lens</title>

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --muted:#bdbdbd;
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background: radial-gradient(1200px 700px at 50% 20%, rgba(255,255,255,.06), transparent 60%), var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }

        header{
            position:sticky;
            top:0;
            z-index:10;
            padding:18px 22px;
            border-bottom:1px solid rgba(255,255,255,.06);
            background: linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,.35));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            /* important: no "space-between" since there's no nav anymore */
            display:flex;
            align-items:center;
            justify-content:flex-start;
        }

        /* Logo is the home link */
        .brand-link{
            display:inline-flex;
            align-items:center;
            text-decoration:none;
            cursor:pointer;
        }

        .brand-link img{
            height:34px;
            width:auto;
            opacity:.95;
            user-select:none;
            -webkit-user-drag:none;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            transition: transform .15s ease, opacity .15s ease;
        }

        .brand-link:hover img{
            transform: translateY(-1px);
            opacity:1;
        }

        main{
            max-width:860px;
            margin:0 auto;
            padding:42px 22px 80px;
        }

        h1{
            margin:0 0 10px;
            font-size:38px;
            letter-spacing:.06em;
            text-transform:uppercase;
        }

        .sub{
            color:var(--muted);
            letter-spacing:.12em;
            text-transform:uppercase;
            font-size:12px;
            margin-bottom:34px;
        }

        .panel{
            border:1px solid rgba(255,255,255,.10);
            border-radius:18px;
            padding:22px;
            background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
            box-shadow: 0 22px 60px rgba(0,0,0,.55);
        }

        p{
            color:#e6e6e6;
            line-height:1.7;
            margin:0 0 14px;
            font-size:16px;
        }

        .rule{
            margin:18px 0;
            height:1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
            opacity:.7;
        }
    </style>
</head>

<body>
<header>
    <!-- Click the logo to go Home -->
    <a class="brand-link" href="../index.html" aria-label="Go to Home">
        <img src="../RodeoLens.png" alt="Rodeo Lens" />
    </a>
</header>

<main>
    <h1>Manifesto</h1>
    <div class="sub">Black. White. Chrome. Minimal intent.</div>

    <section class="panel">
        <p><strong>Rodeo Lens</strong></p>
        <div class="rule"></div>
        <p>.</p>
    </section>
</main>
</body>
</html>
