<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rodeo Lens</title>

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.12);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 80%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        /* Manifesto link pill (CLICKABLE) */
        .manifesto-pill{
            position:absolute;
            top:18px;
            right:22px;

            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);

            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:12px;
            padding:10px 12px;
            border:1px solid var(--edge);
            border-radius:999px;
            background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            user-select:none;

            transition: transform .15s ease, border-color .15s ease, background .15s ease;
        }

        .manifesto-pill:hover{
            transform: translateY(-1px);
            border-color: rgba(255,255,255,.25);
            background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
        }

        .brand{
            pointer-events:none;
            display:flex;
            justify-content:center;
            width:100%;
        }

        .brand img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Scorpion link wrapper */
        .scorpion-link{
            display:inline-block;
            text-decoration:none;
            outline:none;
            cursor:pointer;
        }

        /* OUTER = fade-in only (so hover doesn't break) */
        .scorpion-fade{
            opacity:0;
            transform: translateY(10px);
            animation: scorpionFadeIn 900ms ease-out 80ms forwards;
        }

        /* INNER = hover pop/bob only */
        .scorpion-hover{
            display:inline-block;
            transform: translateY(0) scale(1);
            transform-origin:center;
            transition: transform 180ms ease, filter 180ms ease;

            filter:
                    drop-shadow(0 26px 38px rgba(0,0,0,.65))
                    drop-shadow(0 0 18px rgba(255,255,255,.04));
        }

        .scorpion-link:hover .scorpion-hover{
            transform: translateY(-3px) scale(1.02);
            filter:
                    drop-shadow(0 30px 44px rgba(0,0,0,.70))
                    drop-shadow(0 0 22px rgba(255,255,255,.06));
        }

        .scorpion-img{
            width: min(520px, 82vw);
            height:auto;
            display:block;
            user-select:none;
            -webkit-user-drag:none;
        }

        @keyframes scorpionFadeIn{
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce){
            .scorpion-fade{
                animation:none;
                opacity:1;
                transform:none;
            }
            .scorpion-link:hover .scorpion-hover{
                transform:none;
            }
        }
    </style>
</head>

<body>
<header class="topbar">
    <!-- NOTE: points to /manifesto via folder -->
    <a class="manifesto-pill" href="manifesto/">Manifesto</a>

    <div class="brand" aria-hidden="true">
        <img src="RodeoLens.png" alt="Rodeo Lens" />
    </div>
</header>

<main class="wrap">
    <a class="scorpion-link" href="manifesto/" aria-label="Open Manifesto">
        <div class="scorpion-fade">
            <div class="scorpion-hover">
                <img class="scorpion-img" src="Scorpion.png" alt="Scorpion" />
            </div>
        </div>
    </a>
</main>
</body>
</html>
