<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rodeo Lens</title>
    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.12);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }
        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 80%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        .manifesto-link{
            position:absolute;
            top:18px;
            right:22px;
            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);
            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:12px;
            padding:10px 12px;
            border:1px solid var(--edge);
            border-radius:999px;
            background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: transform .15s ease, border-color .15s ease, background .15s ease;
        }
        .manifesto-link:hover{
            transform: translateY(-1px);
            border-color: rgba(255,255,255,.25);
            background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
        }

        .brand{
            pointer-events:none;
            display:flex;
            justify-content:center;
            width:100%;
        }
        .brand img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Scorpion */
        .scorpion-link{
            display:inline-block;
            text-decoration:none;
            outline:none;
            cursor:pointer;
        }

        .scorpion-img{
            width: min(520px, 82vw); /* bigger than before */
            height:auto;
            display:block;
            user-select:none;
            -webkit-user-drag:none;
            filter:
                    drop-shadow(0 26px 38px rgba(0,0,0,.65))
                    drop-shadow(0 0 18px rgba(255,255,255,.04));
            transition: transform .18s ease, filter .18s ease;
        }

        .scorpion-link:hover .scorpion-img{
            transform: translateY(-2px) scale(1.01);
            filter:
                    drop-shadow(0 30px 44px rgba(0,0,0,.70))
                    drop-shadow(0 0 22px rgba(255,255,255,.06));
        }
    </style>
</head>

<body>
<header class="topbar">
    <a class="manifesto-link" href="manifesto.html">Manifesto</a>

    <div class="brand" aria-hidden="true">
        <img src="RodeoLens.png" alt="Rodeo Lens" />
    </div>
</header>

<main class="wrap">
    <a class="scorpion-link" href="manifesto.html" aria-label="Open Manifesto">
        <img class="scorpion-img" src="Scorpion.png" alt="Scorpion" />
    </a>
</main>
</body>
</html>
