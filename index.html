<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rodeo Lens</title>
    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --muted:#bdbdbd;
            --chrome-1: rgba(255,255,255,.9);
            --chrome-2: rgba(200,200,200,.35);
            --chrome-3: rgba(255,255,255,.06);
            --edge: rgba(255,255,255,.12);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }
        body{
            margin:0;
            background: radial-gradient(1200px 700px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
            radial-gradient(900px 600px at 50% 80%, rgba(255,255,255,.03), transparent 55%),
            var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
            overflow-x:hidden;
        }

        /* Top bar */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none; /* allow clicks only on items that enable it */
            z-index:10;
        }

        .manifesto-link{
            position:absolute;
            top:18px;
            right:22px;
            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);
            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:12px;
            padding:10px 12px;
            border:1px solid var(--edge);
            border-radius:999px;
            background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: transform .15s ease, border-color .15s ease, background .15s ease;
        }
        .manifesto-link:hover{
            transform: translateY(-1px);
            border-color: rgba(255,255,255,.25);
            background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
        }

        .brand{
            pointer-events:none;
            display:flex;
            justify-content:center;
            width:100%;
        }
        .brand img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
        }

        /* Layout */
        .wrap{
            min-height:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Scorpion hero */
        .scorpion-link{
            display:inline-block;
            text-decoration:none;
            outline:none;
        }
        .scorpion-wrap{
            position:relative;
            display:inline-grid;
            place-items:center;
            padding:10px;
            border-radius:26px;
            transition: transform .18s ease, filter .18s ease;
        }

        /* subtle chrome frame around the hero */
        .scorpion-wrap::before{
            content:"";
            position:absolute;
            inset:-2px;
            border-radius:28px;
            background:
                    linear-gradient(135deg,
                    rgba(255,255,255,.22),
                    rgba(255,255,255,.04) 30%,
                    rgba(255,255,255,.14) 60%,
                    rgba(255,255,255,.02)
                    );
            opacity:.35;
            pointer-events:none;
            filter: blur(.2px);
        }

        .scorpion-img{
            position:relative;
            width:min(420px, 70vw);
            height:auto;
            display:block;
            user-select:none;
            -webkit-user-drag:none;
            filter:
                    drop-shadow(0 22px 30px rgba(0,0,0,.6))
                    drop-shadow(0 0 18px rgba(255,255,255,.06));
            transform: translateZ(0);
        }

        /* Chrome glisten sweep (only on hover) */
        .scorpion-wrap::after{
            content:"";
            position:absolute;
            inset:-12%;
            border-radius:34px;

            /* the “sweep” */
            background: linear-gradient(
                    120deg,
                    transparent 0%,
                    rgba(255,255,255,0.00) 28%,
                    rgba(255,255,255,0.75) 48%,
                    rgba(220,220,220,0.28) 56%,
                    rgba(255,255,255,0.06) 62%,
                    transparent 78%,
                    transparent 100%
            );

            transform: translateX(-140%);
            opacity:0;
            pointer-events:none;

            /* makes it feel like light reflecting off chrome */
            mix-blend-mode: screen;
            filter: blur(1.6px);
        }

        .scorpion-link:hover .scorpion-wrap{
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.02);
            cursor:pointer;
        }
        .scorpion-link:hover .scorpion-wrap::after{
            opacity:1;
            animation: glisten 1.25s linear infinite;
        }

        @keyframes glisten{
            0%   { transform: translateX(-140%) rotate(0.001deg); }
            100% { transform: translateX(140%)  rotate(0.001deg); }
        }

        /* optional tiny footer vibe */
        .hint{
            margin-top:22px;
            color:var(--muted);
            font-size:12px;
            letter-spacing:.14em;
            text-transform:uppercase;
            opacity:.7;
            user-select:none;
        }
    </style>
</head>

<body>
<header class="topbar">
    <a class="manifesto-link" href="manifesto.html">Manifesto</a>

    <div class="brand" aria-hidden="true">
        <img src="RodeoLens.png" alt="Rodeo Lens" />
    </div>
</header>

<main class="wrap">
    <a class="scorpion-link" href="manifesto.html" aria-label="Open Manifesto">
        <div class="scorpion-wrap">
            <img class="scorpion-img" src="Scorpion.png" alt="Scorpion" />
        </div>
    </a>

    <div class="hint">Click the mark</div>
</main>
</body>
</html>
