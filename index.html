<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rodeo Lens</title>

    <!-- Scorpion favicon -->
    <link rel="icon" type="image/png" href="Scorpion.png">
    <link rel="apple-touch-icon" href="Scorpion.png">

    <style>
        :root{
            --bg:#070707;
            --fg:#f2f2f2;
            --edge: rgba(255,255,255,.12);
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }

        body{
            margin:0;
            background:
                    radial-gradient(1200px 700px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
                    radial-gradient(900px 600px at 50% 80%, rgba(255,255,255,.03), transparent 55%),
                    var(--bg);
            color:var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            overflow-x:hidden;
        }

        /* Top bar */
        .topbar{
            position:fixed;
            inset:0 0 auto 0;
            padding:18px 22px;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            pointer-events:none;
            z-index:10;
        }

        /* Manifesto text link (top-left, no bubble) */
        .manifesto-link{
            position:absolute;
            top:18px;
            left:22px;

            pointer-events:auto;
            text-decoration:none;
            color:var(--fg);

            letter-spacing:.18em;
            text-transform:uppercase;
            font-size:14px;
            user-select:none;

            opacity:.9;
            transition: opacity .15s ease;
        }

        .manifesto-link:hover{
            opacity:1;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        .brand{
            pointer-events:none;
            display:flex;
            justify-content:center;
            width:100%;
        }

        .brand img{
            height:44px;
            width:auto;
            opacity:.95;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
            user-select:none;
            -webkit-user-drag:none;
        }

        /* Center layout */
        .wrap{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:120px 20px 60px;
        }

        /* Scorpion link wrapper */
        .scorpion-link{
            display:inline-block;
            text-decoration:none;
            outline:none;
            cursor:pointer;
        }

        /* OUTER = fade-in only (so hover doesn't break) */
        .scorpion-fade{
            opacity:0;
            transform: translateY(10px);
            animation: scorpionFadeIn 900ms ease-out 80ms forwards;
        }

        /* INNER = hover pop/bob only */
        .scorpion-hover{
            display:inline-block;
            transform: translateY(0) scale(1);
            transform-origin:center;
            transition: transform 180ms ease, filter 180ms ease;

            filter:
                    drop-shadow(0 26px 38px rgba(0,0,0,.65))
                    drop-shadow(0 0 18px rgba(255,255,255,.04));
        }

        .scorpion-link:hover .scorpion-hover{
            transform: translateY(-3px) scale(1.02);
            filter:
                    drop-shadow(0 30px 44px rgba(0,0,0,.70))
                    drop-shadow(0 0 22px rgba(255,255,255,.06));
        }

        .scorpion-img{
            width: min(520px, 82vw);
            height:auto;
            display:block;
            user-select:none;
            -webkit-user-drag:none;
        }

        @keyframes scorpionFadeIn{
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce){
            .scorpion-fade{
                animation:none;
                opacity:1;
                transform:none;
            }
            .scorpion-link:hover .scorpion-hover{
                transform:none;
            }
        }

        /* ===========================
           FIX #1: Mobile layout fix
           =========================== */
        @media (max-width: 560px){
            .topbar{
                padding:14px 16px;
                align-items:center;
            }

            /* put MANIFESTO on its own row */
            .manifesto-link{
                position:static;    /* stop absolute overlap */
                display:block;
                text-align:left;
                margin-bottom:10px;
            }

            /* keep logo centered on its own row */
            .brand{
                justify-content:center;
            }

            .brand img{
                height:38px;        /* slightly smaller logo on mobile */
            }
        }
    </style>
</head>

<body>
<header class="topbar">
    <!-- Use absolute path so URL stays clean -->
    <a class="manifesto-link" href="/manifesto/">Manifesto</a>

    <div class="brand" aria-hidden="true">
        <img src="RodeoLens.png" alt="Rodeo Lens" />
    </div>
</header>

<main class="wrap">
    <!-- Use absolute path so URL stays clean -->
    <a class="scorpion-link" href="/manifesto/" aria-label="Open Manifesto">
        <div class="scorpion-fade">
            <div class="scorpion-hover">
                <img class="scorpion-img" src="Scorpion.png" alt="Scorpion" />
            </div>
        </div>
    </a>
</main>

<!-- Optional: if someone lands on /index.html, normalize to / -->
<script>
    if (location.pathname.endsWith("/index.html")) {
        history.replaceState(null, "", location.pathname.replace("/index.html", "/") + location.search + location.hash);
    }
</script>
</body>
</html>
